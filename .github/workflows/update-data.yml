name: Update live match data

on:
  schedule:
    # Every 2 hours, 11am-9pm Central Time (CDT, UTC-5 -- the offset actually in effect
    # during the June/July World Cup window). GitHub Actions cron is fixed UTC with no
    # DST awareness: 16,18,20,22,0,2 UTC = 11am,1pm,3pm,5pm,7pm,9pm CDT. If this needs to
    # keep running after the US falls back to Standard Time (UTC-6, early November), these
    # hours must shift back by one (15,17,19,21,23,1).
    - cron: "0 0,2,16,18,20,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "Update live match data"
            git push
          else
            echo "No changes to commit."
          fi
