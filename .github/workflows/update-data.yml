name: Update live match data

on:
  schedule:
    # Every 2 hours, 11am-9pm Central Time (CDT, UTC-5 -- the offset actually in effect
    # during the June/July World Cup window). GitHub Actions cron is fixed UTC with no
    # DST awareness: 16,18,20,22,0,2 UTC = 11am,1pm,3pm,5pm,7pm,9pm CDT. If this needs to
    # keep running after the US falls back to Standard Time (UTC-6, early November), these
    # hours must shift back by one (15,17,19,21,23,1).
    - cron: "0 0,2,16,18,20,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DATA_BOT_PAT }}

      # The tournament Final is played July 19, 2026 -- cron has no built-in end date, so
      # gate the scheduled trigger here instead of leaving it running (and burning free-tier
      # API calls) indefinitely. Manual workflow_dispatch runs always bypass this, in case a
      # correction is needed after the cutoff. Uses UTC date; being off by a few hours around
      # the exact midnight boundary doesn't matter for a "stop after the tournament" cutoff.
      - name: Check if within active window
        id: window
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%Y-%m-%d)" \> "2026-07-19" ]; then
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Past the July 19 cutoff -- skipping scheduled run."
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run update script
        if: steps.window.outputs.active == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-data.js

      - name: Commit and push if changed
        if: steps.window.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "Update live match data"
            for i in 1 2 3; do
              git pull --rebase origin "$GITHUB_REF_NAME" && git push origin "HEAD:$GITHUB_REF_NAME" && break
              echo "Push attempt $i failed (likely non-fast-forward); retrying after pull --rebase..." >&2
              if [ "$i" = "3" ]; then
                echo "Giving up after 3 push attempts." >&2
                exit 1
              fi
              sleep $((i * 5))
            done
          else
            echo "No changes to commit."
          fi
