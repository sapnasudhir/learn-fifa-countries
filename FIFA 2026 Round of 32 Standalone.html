document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px);\" style-hover=\"background:rgba(240,184,64,0.12); border-color:rgba(240,184,64,0.6);\">−<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"position:absolute; bottom:36px; left:62px; font-family:'Barlow Condensed'; font-size:9px; color:rgba(255,255,255,0.22); letter-spacing:1.5px; pointer-events:none; user-select:none;\">SCROLL · ZOOM · DRAG<\u002Fdiv>\n\n    <!-- INSTRUCTION -->\n    <sc-if value=\"{{ noCountry }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute; bottom:28px; left:50%; transform:translateX(-50%); background:rgba(6,9,15,0.88); border:1px solid rgba(240,184,64,0.18); border-radius:6px; padding:9px 22px; white-space:nowrap; pointer-events:none; animation:fadeUp 0.6s ease 1.2s both;\">\n        <span style=\"font-family:'Barlow Condensed'; font-size:12px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.45);\">CLICK ANY HIGHLIGHTED COUNTRY TO VIEW STATS<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- INFO PANEL -->\n    <sc-if value=\"{{ hasCountry }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; top:0; right:0; bottom:0; width:400px; background:rgba(7,11,20,0.97); border-left:1px solid rgba(240,184,64,0.12); overflow-y:auto; animation:panelIn 0.3s ease; display:flex; flex-direction:column;\">\n\n        <!-- Flag Banner -->\n        <div style=\"position:relative; height:72px; overflow:hidden; flex-shrink:0;\">\n          <div style=\"{{ flagBannerBgStyle }}\"><\u002Fdiv>\n          <div style=\"position:absolute; inset:0; background:linear-gradient(transparent 20%, rgba(7,11,20,0.97));\"><\u002Fdiv>\n          <button onclick=\"{{ closePanel }}\" title=\"Close\" style=\"position:absolute; top:12px; right:14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.55); width:28px; height:28px; border-radius:50%; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; z-index:2;\" style-hover=\"background:rgba(255,255,255,0.14);\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- Tier stripe -->\n        <div style=\"height:3px; background:{{ tierColor }}; flex-shrink:0;\"><\u002Fdiv>\n\n        <!-- Country Header -->\n        <div style=\"padding:16px 20px 14px; flex-shrink:0;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:12px;\">\n            <div style=\"{{ flagThumbStyle }}\"><\u002Fdiv>\n            <div style=\"min-width:0;\">\n              <div style=\"font-family:'Barlow Condensed'; font-size:26px; font-weight:900; line-height:1; color:white; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ countryName }}<\u002Fdiv>\n              <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.38); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ capitalLine }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap;\">\n            <div style=\"display:inline-flex; align-items:center; gap:6px; padding:4px 11px; border-radius:4px; background:{{ r32BadgeBg }};\">\n              <div style=\"width:5px; height:5px; border-radius:50%; background:{{ r32BadgeColor }};\"><\u002Fdiv>\n              <span style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:700; letter-spacing:1.5px; color:{{ r32BadgeColor }};\">{{ r32BadgeLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Barlow Condensed'; font-size:10px; letter-spacing:1.5px; color:rgba(255,255,255,0.28);\">GROUP {{ countryGroup }} · {{ countryPosLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:rgba(255,255,255,0.06); margin:0 20px; flex-shrink:0;\"><\u002Fdiv>\n\n        <!-- MATCHES -->\n        <div style=\"padding:14px 20px; flex-shrink:0;\">\n          <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.3); margin-bottom:8px;\">GROUP STAGE MATCHES<\u002Fdiv>\n          <sc-for list=\"{{ groupGames }}\" as=\"gm\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04);\">\n              <div style=\"width:20px; height:18px; border-radius:3px; background:{{ gm.bgColor }}; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n                <span style=\"font-family:'Barlow Condensed'; font-size:11px; font-weight:900; color:{{ gm.txtColor }}; line-height:1;\">{{ gm.result }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-family:'Barlow'; font-size:12px; color:rgba(255,255,255,0.55); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">vs {{ gm.opp }}<\u002Fspan>\n              <span style=\"font-family:'Barlow Condensed'; font-size:14px; font-weight:700; color:white; flex-shrink:0; letter-spacing:0.5px;\">{{ gm.score }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.3); margin-top:10px; margin-bottom:8px;\">ROUND OF 32<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; padding:6px 0;\">\n            <div style=\"width:20px; height:18px; border-radius:3px; background:{{ r32BgColor }}; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n              <span style=\"font-family:'Barlow Condensed'; font-size:11px; font-weight:900; color:{{ r32TxtColor }}; line-height:1;\">{{ r32Result }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Barlow'; font-size:12px; color:rgba(255,255,255,0.55); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">vs {{ r32Opp }}<\u002Fspan>\n            <span style=\"font-family:'Barlow Condensed'; font-size:14px; font-weight:700; color:white; flex-shrink:0; letter-spacing:0.5px;\">{{ r32ScoreStr }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:rgba(255,255,255,0.06); margin:0 20px; flex-shrink:0;\"><\u002Fdiv>\n\n        <!-- W/D/L RECORD -->\n        <div style=\"padding:14px 20px; flex-shrink:0;\">\n          <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.3); margin-bottom:10px;\">GROUP STAGE RECORD<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\">\n            <div style=\"flex:1; background:rgba(74,222,128,0.06); border:1px solid rgba(74,222,128,0.12); border-radius:6px; padding:10px 6px; text-align:center;\">\n              <div style=\"font-family:'Barlow Condensed'; font-size:26px; font-weight:900; color:#4ade80; line-height:1;\">{{ wins }}<\u002Fdiv>\n              <div style=\"font-family:'Barlow Condensed'; font-size:9px; font-weight:700; letter-spacing:1.5px; color:rgba(74,222,128,0.5); margin-top:3px;\">WINS<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:rgba(250,204,21,0.06); border:1px solid rgba(250,204,21,0.12); border-radius:6px; padding:10px 6px; text-align:center;\">\n              <div style=\"font-family:'Barlow Condensed'; font-size:26px; font-weight:900; color:#facc15; line-height:1;\">{{ draws }}<\u002Fdiv>\n              <div style=\"font-family:'Barlow Condensed'; font-size:9px; font-weight:700; letter-spacing:1.5px; color:rgba(250,204,21,0.5); margin-top:3px;\">DRAWS<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:rgba(248,113,113,0.06); border:1px solid rgba(248,113,113,0.12); border-radius:6px; padding:10px 6px; text-align:center;\">\n              <div style=\"font-family:'Barlow Condensed'; font-size:26px; font-weight:900; color:#f87171; line-height:1;\">{{ losses }}<\u002Fdiv>\n              <div style=\"font-family:'Barlow Condensed'; font-size:9px; font-weight:700; letter-spacing:1.5px; color:rgba(248,113,113,0.5); margin-top:3px;\">LOSSES<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:6px; padding:10px 6px; text-align:center;\">\n              <div style=\"font-family:'Barlow Condensed'; font-size:18px; font-weight:900; color:white; line-height:1.3;\">{{ goalRecord }}<\u002Fdiv>\n              <div style=\"font-family:'Barlow Condensed'; font-size:9px; font-weight:700; letter-spacing:1.5px; color:rgba(255,255,255,0.3); margin-top:3px;\">GF / GA<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:rgba(255,255,255,0.06); margin:0 20px; flex-shrink:0;\"><\u002Fdiv>\n\n        <!-- SQUAD VALUE -->\n        <div style=\"padding:14px 20px; flex-shrink:0;\">\n          <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.3); margin-bottom:6px;\">SQUAD MARKET VALUE<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed'; font-size:34px; font-weight:900; color:{{ tierColor }}; line-height:1; margin-bottom:8px;\">{{ squadValue }}<\u002Fdiv>\n          <div style=\"height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden;\">\n            <div style=\"height:100%; background:{{ tierColor }}; width:{{ valueBarPct }}; border-radius:2px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Barlow'; font-size:10px; color:rgba(255,255,255,0.2); margin-top:4px;\">Relative to highest (France €1.52B)<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:rgba(255,255,255,0.06); margin:0 20px; flex-shrink:0;\"><\u002Fdiv>\n\n        <!-- TOP 3 PLAYERS -->\n        <div style=\"padding:14px 20px; flex-shrink:0;\">\n          <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.3); margin-bottom:10px;\">TOP 3 MOST VALUABLE PLAYERS<\u002Fdiv>\n          <sc-for list=\"{{ players }}\" as=\"player\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04);\">\n              <div style=\"width:24px; height:24px; border-radius:50%; background:rgba(240,184,64,0.12); border:1px solid rgba(240,184,64,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n                <span style=\"font-family:'Barlow Condensed'; font-size:12px; font-weight:900; color:#f0b840;\">{{ player.rank }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-family:'Barlow Condensed'; font-size:14px; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ player.name }}<\u002Fdiv>\n                <div style=\"font-family:'Barlow'; font-size:10px; color:rgba(255,255,255,0.35);\">{{ player.club }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'Barlow Condensed'; font-size:13px; font-weight:700; color:{{ tierColor }}; flex-shrink:0;\">{{ player.val }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:rgba(255,255,255,0.06); margin:0 20px; flex-shrink:0;\"><\u002Fdiv>\n\n        <!-- COUNTRY FACTS -->\n        <div style=\"padding:14px 20px 28px; flex-shrink:0;\">\n          <div style=\"font-family:'Barlow Condensed'; font-size:10px; font-weight:600; letter-spacing:2.5px; color:rgba(255,255,255,0.3); margin-bottom:10px;\">COUNTRY FACTS<\u002Fdiv>\n          <sc-for list=\"{{ facts }}\" as=\"fact\" hint-placeholder-count=\"5\">\n            <div style=\"padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04);\">\n              <div style=\"font-family:'Barlow Condensed'; font-size:9px; font-weight:700; letter-spacing:2px; color:{{ tierColor }}; margin-bottom:3px; text-transform:uppercase;\">{{ fact.label }}<\u002Fdiv>\n              <div style=\"font-family:'Barlow'; font-size:12px; color:rgba(255,255,255,0.62); line-height:1.5;\">{{ fact.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"margin-top:16px; font-family:'Barlow'; font-size:10px; color:rgba(255,255,255,0.18); text-align:center;\">Source: FIFA · Transfermarkt · General Knowledge<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { selected: null };\n\n  TEAMS = {};\n  ISO_MAP = {};\n\n  tierColor(val) {\n    if (val >= 500) return '#f0b840';\n    if (val >= 200) return '#d07c10';\n    if (val >= 100) return '#a85c18';\n    return '#6e3e18';\n  }\n  hoverColor(val) {\n    if (val >= 500) return '#ffd060';\n    if (val >= 200) return '#f09020';\n    if (val >= 100) return '#cc7030';\n    return '#9a5a28';\n  }\n\n  zoomIn()    { if (this.svg && this.zb) this.svg.transition().duration(300).call(this.zb.scaleBy, 1.65); }\n  zoomOut()   { if (this.svg && this.zb) this.svg.transition().duration(300).call(this.zb.scaleBy, 0.6); }\n  resetZoom() { if (this.svg && this.zb) this.svg.transition().duration(500).call(this.zb.transform, d3.zoomIdentity); }\n\n  componentDidMount() {\n    const self = this;\n    const atlasUrl = (window.__resources && window.__resources.worldAtlas) || 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';\n    Promise.all([\n      fetch('./data.json').then(r => r.json()),\n      d3.json(atlasUrl)\n    ]).then(([data, world]) => {\n      self.TEAMS = data.TEAMS;\n      self.ISO_MAP = data.ISO_MAP;\n      self.worldData = world;\n      self.renderMap();\n    });\n    this._onResize = () => { if (this.worldData) this.renderMap(); };\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n  componentDidUpdate(pp, ps) { if (ps.selected !== this.state.selected) this.updateHighlight(); }\n\n  renderMap() {\n    const container = document.getElementById('map-container');\n    if (!container) return;\n    const { width, height } = container.getBoundingClientRect();\n    if (!width || !height) return;\n\n    d3.select('#map-container svg').remove();\n    d3.select('#map-container .tt').remove();\n\n    const svg = d3.select('#map-container').append('svg')\n      .attr('width', width).attr('height', height).style('display','block');\n    this.svg = svg;\n\n    // Background\n    svg.append('rect').attr('width', width).attr('height', height).attr('fill','#0c1828');\n\n    // Zoomable group\n    const g = svg.append('g');\n    this.g = g;\n\n    const scale = Math.min(width / 6.2, height / 3.2);\n    const proj = d3.geoNaturalEarth1().scale(scale).translate([width / 2, height / 2 + height * 0.04]);\n    const path = d3.geoPath().projection(proj);\n    this.pathFn = path;\n\n    // Graticule\n    g.append('path').datum(d3.geoGraticule()())\n      .attr('d', path).attr('fill','none')\n      .attr('stroke','rgba(255,255,255,0.035)').attr('stroke-width',0.5);\n    // Sphere border\n    g.append('path').datum({type:'Sphere'})\n      .attr('d', path).attr('fill','none')\n      .attr('stroke','rgba(255,255,255,0.07)').attr('stroke-width',0.8);\n\n    const features = topojson.feature(this.worldData, this.worldData.objects.countries).features;\n    const self = this;\n\n    // Tooltip\n    this.tt = d3.select('#map-container').append('div').attr('class','tt')\n      .style('position','absolute').style('pointer-events','none')\n      .style('background','rgba(6,9,15,0.93)').style('border','1px solid rgba(240,184,64,0.4)')\n      .style('color','#f0b840').style('padding','5px 13px').style('border-radius','4px')\n      .style('font-family','Barlow Condensed,sans-serif').style('font-size','13px')\n      .style('font-weight','700').style('letter-spacing','1.5px').style('text-transform','uppercase')\n      .style('opacity','0').style('transition','opacity 0.1s').style('z-index','20').style('white-space','nowrap');\n\n    this.cpaths = g.selectAll('.cp').data(features).enter().append('path')\n      .attr('class','cp').attr('d', path)\n      .attr('fill', d => { const k = self.ISO_MAP[+d.id]; return k ? self.tierColor(self.TEAMS[k].val) : '#101e30'; })\n      .attr('stroke','#07101e').attr('stroke-width',0.5)\n      .style('cursor', d => self.ISO_MAP[+d.id] ? 'pointer' : 'default')\n      .on('click', (event, d) => {\n        const k = self.ISO_MAP[+d.id];\n        if (k) { self.setState({ selected: k }); self.tt.style('opacity','0'); }\n      })\n      .on('mouseover', function(event, d) {\n        const k = self.ISO_MAP[+d.id];\n        if (!k) return;\n        if (k !== self.state.selected) d3.select(this).attr('fill', self.hoverColor(self.TEAMS[k].val)).attr('stroke','rgba(240,184,64,0.5)').attr('stroke-width',1);\n        self.tt.style('opacity','1').text(self.TEAMS[k].name);\n      })\n      .on('mousemove', function(event) { self.tt.style('left',(event.offsetX+16)+'px').style('top',(event.offsetY-14)+'px'); })\n      .on('mouseout', function(event, d) {\n        const k = self.ISO_MAP[+d.id];\n        if (!k) return;\n        if (k !== self.state.selected) d3.select(this).attr('fill', self.tierColor(self.TEAMS[k].val)).attr('stroke','#07101e').attr('stroke-width',0.5);\n        self.tt.style('opacity','0');\n      });\n\n    // Zoom behavior\n    const zb = d3.zoom().scaleExtent([0.7, 14])\n      .on('zoom', event => g.attr('transform', event.transform));\n    svg.call(zb);\n    this.zb = zb;\n\n    // Cape Verde: islands too small for 110m atlas — render explicit marker\n    const cpvPt = proj([-24, 16]);\n    const cpvG = g.append('g').attr('class','cpv-marker').style('cursor','pointer')\n      .on('click', () => { self.setState({ selected: 'CPV' }); self.tt.style('opacity','0'); })\n      .on('mouseover', function() {\n        if (self.state.selected !== 'CPV') {\n          d3.select(this).select('circle').attr('fill', self.hoverColor(30)).attr('stroke','rgba(240,184,64,0.5)').attr('stroke-width',1.5);\n        }\n        self.tt.style('opacity','1').text('Cape Verde');\n      })\n      .on('mousemove', function(event) { self.tt.style('left',(event.offsetX+16)+'px').style('top',(event.offsetY-14)+'px'); })\n      .on('mouseout', function() {\n        if (self.state.selected !== 'CPV') {\n          d3.select(this).select('circle').attr('fill', self.tierColor(30)).attr('stroke','rgba(110,62,24,0.5)').attr('stroke-width',1);\n        }\n        self.tt.style('opacity','0');\n      });\n\n    cpvG.append('circle')\n      .attr('cx', cpvPt[0]).attr('cy', cpvPt[1]).attr('r', 6)\n      .attr('fill', self.tierColor(30))\n      .attr('stroke','rgba(110,62,24,0.5)').attr('stroke-width',1);\n\n    cpvG.append('text')\n      .attr('x', cpvPt[0] + 9).attr('y', cpvPt[1] + 4)\n      .attr('fill','rgba(255,255,255,0.45)').attr('pointer-events','none')\n      .attr('font-family','Barlow Condensed,sans-serif').attr('font-size','9px')\n      .attr('font-weight','700').attr('letter-spacing','1px').text('CPV');\n\n    this.cpvMarker = cpvG;\n\n    this.updateHighlight();\n  }\n\n  updateHighlight() {\n    if (!this.cpaths) return;\n    const self = this;\n    this.cpaths.each(function(d) {\n      const k = self.ISO_MAP[+d.id];\n      if (!k) return;\n      const sel = self.state.selected === k;\n      d3.select(this).transition().duration(180)\n        .attr('fill', sel ? '#ffd700' : self.tierColor(self.TEAMS[k].val))\n        .attr('stroke', sel ? 'rgba(255,215,0,0.7)' : '#07101e')\n        .attr('stroke-width', sel ? 2 : 0.5);\n    });\n    // Cape Verde dot marker\n    if (this.cpvMarker) {\n      const sel = this.state.selected === 'CPV';\n      this.cpvMarker.select('circle').transition().duration(180)\n        .attr('fill', sel ? '#ffd700' : this.tierColor(30))\n        .attr('stroke', sel ? 'rgba(255,215,0,0.7)' : 'rgba(110,62,24,0.5)')\n        .attr('stroke-width', sel ? 2 : 1)\n        .attr('r', sel ? 8 : 6);\n    }\n  }\n\n  renderVals() {\n    const { selected } = this.state;\n    const d = selected ? this.TEAMS[selected] : null;\n    const tc = d ? this.tierColor(d.val) : '#f0b840';\n    const isR16 = d && d.status === 'R16';\n    const pct = d ? Math.max(2, Math.round(d.val / 1520 * 100)) + '%' : '0%';\n\n    const posMap = { '1st':'1ST PLACE', '2nd':'RUNNER-UP', '3rd':'3RD (BEST)' };\n\n    const gameColor = r => r === 'W' ? { bgColor:'rgba(74,222,128,0.18)', txtColor:'#4ade80' }\n                        : r === 'L' ? { bgColor:'rgba(248,113,113,0.18)', txtColor:'#f87171' }\n                        : { bgColor:'rgba(250,204,21,0.15)', txtColor:'#facc15' };\n\n    const groupGames = d ? d.games.map(g => {\n      const result = g.gf > g.ga ? 'W' : g.gf < g.ga ? 'L' : 'D';\n      return { ...g, result, score: g.gf + '–' + g.ga, ...gameColor(result) };\n    }) : [];\n\n    const r32Result = d ? (isR16 ? 'W' : 'L') : '';\n    const r32Colors = r32Result === 'W' ? gameColor('W') : gameColor('L');\n    const rg = d ? d.r32Game : null;\n    const r32ScoreStr = rg ? rg.gf + '–' + rg.ga + (rg.note ? ' ('+rg.note+')' : '') : '';\n\n    const facts = d ? [\n      { label:'CAPITAL',           value: d.facts.capital   },\n      { label:'GEOGRAPHICAL INTEREST', value: d.facts.geo   },\n      { label:'HISTORICAL MILESTONE',  value: d.facts.history },\n      { label:'CULTURE & SOCIETY',     value: d.facts.society },\n      { label:'POPULAR CUISINE',       value: d.facts.cuisine },\n    ] : [];\n\n    const players = d ? d.players.map((p, i) => ({ ...p, rank: i + 1 })) : [];\n    const flagResourceId = d ? 'flag_' + d.iso2.replace('-', '') : '';\n    const flagUrl = d ? ((window.__resources && window.__resources[flagResourceId]) || 'https://flagcdn.com/w160/' + d.iso2 + '.png') : '';\n    const flagBannerBgStyle = d ? { position:'absolute', inset:0, backgroundImage:'url('+flagUrl+')', backgroundSize:'cover', backgroundPosition:'center', opacity:0.22, filter:'blur(5px)', transform:'scale(1.08)' } : {};\n    const flagThumbStyle = d ? { height:'42px', width:'64px', backgroundImage:'url('+flagUrl+')', backgroundSize:'cover', backgroundPosition:'center', borderRadius:'3px', border:'1px solid rgba(255,255,255,0.15)', flexShrink:0, boxShadow:'0 2px 10px rgba(0,0,0,0.5)' } : {};\n\n    return {\n      hasCountry: !!d,\n      noCountry: !d,\n      flagUrl,\n      flagBannerBgStyle,\n      flagThumbStyle,\n      countryName: d ? d.name : '',\n      countryGroup: d ? d.group : '',\n      countryPosLabel: d ? (posMap[d.pos] || d.pos) : '',\n      capitalLine: d ? 'CAPITAL: ' + d.facts.capital : '',\n      wins: d ? d.w : '', draws: d ? d.d : '', losses: d ? d.l : '',\n      goalRecord: d ? d.gf + ' / ' + d.ga : '',\n      squadValue: d ? d.vLabel : '',\n      tierColor: tc, valueBarPct: pct,\n      r32BadgeBg:    isR16 ? 'rgba(20,83,45,0.6)' : 'rgba(127,29,29,0.5)',\n      r32BadgeColor: isR16 ? '#4ade80' : '#f87171',\n      r32BadgeLabel: isR16 ? 'ROUND OF 16 · ADVANCING' : 'ELIMINATED · ROUND OF 32',\n      groupGames,\n      r32Result, r32Opp: rg ? rg.opp : '', r32ScoreStr,\n      r32BgColor: r32Colors.bgColor, r32TxtColor: r32Colors.txtColor,\n      facts, players,\n      zoomIn:    () => this.zoomIn(),\n      zoomOut:   () => this.zoomOut(),\n      resetZoom: () => this.resetZoom(),\n      closePanel: () => this.setState({ selected: null }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
